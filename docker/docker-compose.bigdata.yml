# ── Big Data Distributed Stack ────────────────────────────────────────────────
#
#  Services:
#    HDFS  : namenode + datanode
#    Spark : master + N workers (scale with N_WORKERS env var)
#    Trainer: PyTorch GPU container (reads Spark output, trains GNN)
#    Monitoring: Prometheus + Grafana + Node-exporter
#
#  Usage:
#    # 2 Spark workers
#    N_WORKERS=2 docker compose -f docker/docker-compose.bigdata.yml up --scale spark-worker=2
#
#    # 4 Spark workers
#    N_WORKERS=4 docker compose -f docker/docker-compose.bigdata.yml up --scale spark-worker=4
#
#  Or use the benchmark script:
#    bash scripts/run_benchmark.sh
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

# ── Shared Spark worker template ──────────────────────────────────────────────
x-spark-worker: &spark-worker-base
  image: bitnami/spark:3.5
  environment:
    - SPARK_MODE=worker
    - SPARK_MASTER_URL=spark://spark-master:7077
    - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-3G}
    - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-2}
    - SPARK_RPC_AUTHENTICATION_ENABLED=no
    - SPARK_RPC_ENCRYPTION_ENABLED=no
    - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
    - SPARK_SSL_ENABLED=no
    - HADOOP_CONF_DIR=/opt/hadoop/conf
  volumes:
    - ../data:/data:ro
    - ../spark:/opt/spark-apps:ro
    - processed-data:/processed
    - spark-logs:/opt/bitnami/spark/logs
    - ./hadoop:/opt/hadoop/conf:ro
  depends_on:
    spark-master:
      condition: service_healthy
  networks:
    - gnn-net

services:

  # ── HDFS Namenode ────────────────────────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"    # HDFS Web UI
      - "9000:9000"    # HDFS RPC
    volumes:
      - hdfs-namenode:/hadoop/dfs/name
      - ../data/medium:/input-data:ro    # source unique, jamais modifié
    environment:
      - CLUSTER_NAME=gnn-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9870"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - gnn-net

  # ── HDFS Datanode ────────────────────────────────────────────────────────────
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    volumes:
      - hdfs-datanode:/hadoop/dfs/data
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - gnn-net

  # ── Spark Master ─────────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5
    container_name: spark-master
    hostname: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - HADOOP_CONF_DIR=/opt/hadoop/conf
    ports:
      - "8080:8080"    # Spark Master Web UI
      - "7077:7077"    # Spark Master RPC
      - "4040:4040"    # Spark App UI
    volumes:
      - ../spark:/opt/spark-apps:ro
      - ../data:/data:ro
      - processed-data:/processed
      - spark-logs:/opt/bitnami/spark/logs
      - ./hadoop:/opt/hadoop/conf:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - gnn-net

  # ── Spark Workers (4 workers fixes — visibles dans l'UI Spark) ──────────────
  spark-worker-1:
    <<: *spark-worker-base
    container_name: spark-worker-1
    hostname: spark-worker-1

  spark-worker-2:
    <<: *spark-worker-base
    container_name: spark-worker-2
    hostname: spark-worker-2

  spark-worker-3:
    <<: *spark-worker-base
    container_name: spark-worker-3
    hostname: spark-worker-3

  spark-worker-4:
    <<: *spark-worker-base
    container_name: spark-worker-4
    hostname: spark-worker-4

  # ── GPU Trainer ──────────────────────────────────────────────────────────────
  trainer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.benchmark
    container_name: trainer
    hostname: trainer
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ../data:/workspace/data:ro
      - ../src:/workspace/src:ro
      - ../spark:/workspace/spark:ro
      - ../benchmark:/workspace/benchmark:ro
      - ../configs:/workspace/configs:ro
      - ../checkpoints:/workspace/checkpoints
      - ../outputs:/workspace/outputs
      - processed-data:/workspace/processed
    environment:
      - HDFS_URL=hdfs://namenode:9000
      - SPARK_MASTER=spark://spark-master:7077
      - PROCESSED_DIR=/workspace/processed
      - PYTHONPATH=/workspace/src:/workspace
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      spark-master:
        condition: service_healthy
      namenode:
        condition: service_healthy
    networks:
      - gnn-net

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - gnn-net

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - gnn-net

  # ── Node Exporter (CPU/RAM/Disk metrics) ─────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - gnn-net

volumes:
  hdfs-namenode:
  hdfs-datanode:
  processed-data:
  spark-logs:
  prometheus-data:
  grafana-data:

networks:
  gnn-net:
    driver: bridge
