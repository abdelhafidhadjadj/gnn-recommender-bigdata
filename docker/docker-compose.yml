# ── 4-GPU distributed training on a single machine ───────────────────────────
#
# Uses torchrun (--nproc_per_node=4) inside ONE container that has
# access to all 4 GPUs. This is the correct pattern for single-node
# multi-GPU training — no need for multi-container orchestration.
#
# Prerequisites:
#   - NVIDIA Container Toolkit installed on the host
#   - docker compose plugin (not docker-compose v1)
#
# Launch:
#   docker compose -f docker/docker-compose.yml up
#   docker compose -f docker/docker-compose.yml up -d   # detached
#
# Override model / mode via env file:
#   cp docker/.env.example docker/.env
#   # edit docker/.env
#   docker compose --env-file docker/.env up
# ─────────────────────────────────────────────────────────────────────────────
version: "3.9"

# ── Réseau externe (pipeline/docker-compose.yml) ──────────────────────────────
# Démarrer HDFS + Spark avant de lancer le trainer :
#   cd pipeline && docker compose up -d namenode datanode1 datanode2 spark-master spark-worker
# Puis uploader les données :
#   bash scripts/hdfs_upload.sh --size 1k
# ─────────────────────────────────────────────────────────────────────────────
networks:
  pipeline_net:
    external: true
    name: pipeline_pipeline_net   # <project>=pipeline, <network>=pipeline_net

services:
  trainer:
    image: gnn-rec:prod
    build:
      context: ..
      dockerfile: Dockerfile

    # Rejoindre le réseau pipeline pour accéder à namenode:9000 + spark-master:7077
    networks:
      - pipeline_net

    entrypoint: torchrun

    # Chaque worker utilise toujours 2 GB fixe — comparaison équitable :
    # WORLD_SIZE=1 → standard    (1 worker  × 2 GB)
    # WORLD_SIZE=2 → bigdata x2  (2 workers × 2 GB = 4 GB utilisés)
    # WORLD_SIZE=4 → bigdata x4  (4 workers × 2 GB = 8 GB utilisés)
    command: >
      --nproc_per_node=${WORLD_SIZE:-1}
      --standalone
      src/main.py
      --mode        ${TRAINING_MODE:-scratch}
      --model       ${MODEL_TYPE:-sage}
      --data-dir    ${DATA_DIR:-data/raw/50k}
      --ckpt-dir    checkpoints/${MODEL_TYPE:-sage}_w${WORLD_SIZE:-1}_${SIZE:-50k}
      --output-dir  outputs/${MODEL_TYPE:-sage}_w${WORLD_SIZE:-1}_${SIZE:-50k}
      --seed        ${SEED:-42}
      --graph-mode  ${GRAPH_MODE:-auto}

    # Required for NCCL shared-memory communication between GPU processes
    ipc: host
    ulimits:
      memlock: -1      # unlimited locked memory (NCCL requirement)
      stack: 67108864  # 64 MB stack per process

    # GPU access: all 4 GPUs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Mount host paths for data and checkpoints (survives container restart)
    volumes:
      - ../src:/workspace/src                                      # code source — pas besoin de rebuild
      - ../data:/workspace/data
      - ../checkpoints:/workspace/checkpoints
      - ../outputs:/workspace/outputs
      - ../.sbert_cache:/workspace/.sbert_cache                    # cache embeddings SBERT persistant
      - ${USERPROFILE}/.cache/huggingface:/root/.cache/huggingface # modèle HuggingFace offline

    # Env vars — override via docker/.env ou CLI
    environment:
      - WORLD_SIZE=${WORLD_SIZE:-1}
      - MASTER_ADDR=localhost
      - MASTER_PORT=${MASTER_PORT:-29500}
      - TRAINING_MODE=${TRAINING_MODE:-scratch}
      - MODEL_TYPE=${MODEL_TYPE:-sage}
      - DATA_DIR=${DATA_DIR:-data/raw/50k}
      - CKPT_DIR=${CKPT_DIR:-checkpoints}
      - SIZE=${SIZE:-50k}
      - SEED=${SEED:-42}
      - CUDA_VISIBLE_DEVICES=0
      # ── Bigdata mode (world_size > 1) ────────────────────────────────────────
      # SPARK_MASTER=local[N] : Spark tourne dans le container trainer lui-même.
      # Pas de cluster externe → pas de conflit de version Spark.
      # Pour utiliser un cluster externe : SPARK_MASTER=spark://spark-master:7077
      # (requiert la même version pyspark que le cluster)
      # Spark local[N] : computation dans le container, I/O depuis HDFS
      - SPARK_MASTER=local[${WORLD_SIZE:-1}]
      - HDFS_URL=hdfs://namenode:9000
      # Mode offline HuggingFace — utilise le cache monté, pas d'internet
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1

    # Log output to stdout (visible with `docker compose logs -f`)
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
