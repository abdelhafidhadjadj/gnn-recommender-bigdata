# ─────────────────────────────────────────────────────────────────────────────
# Logstash Pipeline — Kafka → Elasticsearch
# Lit les topics pubmed-articles et arxiv-articles depuis Kafka,
# enrichit les événements et les indexe dans Elasticsearch pour Kibana.
# ─────────────────────────────────────────────────────────────────────────────

input {
  kafka {
    bootstrap_servers => "kafka:29092"
    topics            => ["pubmed-articles", "arxiv-articles"]
    codec             => json { charset => "UTF-8" }
    group_id          => "logstash-elk-consumer"
    auto_offset_reset => "earliest"
    consumer_threads  => 2
    decorate_events   => true          # adds kafka.topic, kafka.partition, etc.
  }
}

# ─────────────────────────────────────────────────────────────────────────────
filter {
  # ── Source routing tag ────────────────────────────────────────────────────
  if [source] == "pubmed" {
    mutate { add_tag => ["pubmed"] }
  } else if [source] == "arxiv" {
    mutate { add_tag => ["arxiv"] }
  }

  # ── Parse published_at as a proper date ───────────────────────────────────
  if [published_at] and [published_at] != "" {
    date {
      match    => ["published_at", "yyyy-MM-dd", "yyyy-MM-dd'T'HH:mm:ss"]
      target   => "published_at"
      timezone => "UTC"
    }
  }

  # ── Parse ingested_at ─────────────────────────────────────────────────────
  if [ingested_at] and [ingested_at] != "" {
    date {
      match  => ["ingested_at", "ISO8601"]
      target => "ingested_at"
    }
  }

  # ── Compute abstract length (useful metric) ────────────────────────────────
  if [abstract] {
    ruby {
      code => "event.set('abstract_length', event.get('abstract').to_s.length)"
    }
  }

  # ── Compute authors count ─────────────────────────────────────────────────
  if [authors] {
    ruby {
      code => "event.set('authors_count', event.get('authors').is_a?(Array) ? event.get('authors').length : 0)"
    }
  }

  # ── Clean up Kafka metadata fields ────────────────────────────────────────
  mutate {
    remove_field => ["@version", "event"]
    add_field    => {
      "pipeline_version" => "1.0"
      "indexed_at"       => "%{+ISO8601}"
    }
  }
}

# ─────────────────────────────────────────────────────────────────────────────
output {
  # ── PubMed → pubmed-articles index ───────────────────────────────────────
  if "pubmed" in [tags] {
    elasticsearch {
      hosts     => ["elasticsearch:9200"]
      index     => "pubmed-articles-%{+YYYY.MM}"
      document_id => "%{pmid}"
      action    => "index"
    }
  }

  # ── ArXiv → arxiv-articles index ─────────────────────────────────────────
  else if "arxiv" in [tags] {
    elasticsearch {
      hosts     => ["elasticsearch:9200"]
      index     => "arxiv-articles-%{+YYYY.MM}"
      document_id => "%{arxiv_id}"
      action    => "index"
    }
  }

  # ── Debug: print to stdout (visible in docker logs logstash) ──────────────
  stdout {
    codec => rubydebug {
      metadata => false
    }
  }
}
