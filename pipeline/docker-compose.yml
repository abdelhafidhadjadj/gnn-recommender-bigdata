networks:
  pipeline_net:
    driver: bridge

volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2:
  elasticsearch_data:
  filebeat_data:
  metricbeat_data:

# ─────────────────────────────────────────────────────────────────────────────
# KAFKA STACK
# ─────────────────────────────────────────────────────────────────────────────
services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks: [pipeline_net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks: [pipeline_net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    networks: [pipeline_net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: scientific-pipeline
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

# ─────────────────────────────────────────────────────────────────────────────
# HADOOP STACK
# ─────────────────────────────────────────────────────────────────────────────

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    networks: [pipeline_net]
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=scientific-cluster
    env_file:
      - hadoop.env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    hostname: datanode1
    networks: [pipeline_net]
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - hadoop_datanode1:/hadoop/dfs/data
    env_file:
      - hadoop.env

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    hostname: datanode2
    networks: [pipeline_net]
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - hadoop_datanode2:/hadoop/dfs/data
    env_file:
      - hadoop.env

# ─────────────────────────────────────────────────────────────────────────────
# SPARK STACK
# ─────────────────────────────────────────────────────────────────────────────

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    networks: [pipeline_net]
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "8081:8080"
      - "7077:7077"
    environment:
      - SPARK_NO_DAEMONIZE=true

  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    hostname: spark-worker-1
    networks: [pipeline_net]
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "--host", "spark-worker-1", "spark://spark-master:7077"]
    ports:
      - "8082:8081"
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1g
      - SPARK_WORKER_CORES=2

  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: spark-worker-2
    hostname: spark-worker-2
    networks: [pipeline_net]
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "--host", "spark-worker-2", "spark://spark-master:7077"]
    ports:
      - "8083:8081"
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1g
      - SPARK_WORKER_CORES=2

  spark-worker-3:
    image: apache/spark:3.5.0
    container_name: spark-worker-3
    hostname: spark-worker-3
    networks: [pipeline_net]
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "--host", "spark-worker-3", "spark://spark-master:7077"]
    ports:
      - "8084:8081"
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1g
      - SPARK_WORKER_CORES=2

  spark-worker-4:
    image: apache/spark:3.5.0
    container_name: spark-worker-4
    hostname: spark-worker-4
    networks: [pipeline_net]
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "--host", "spark-worker-4", "spark://spark-master:7077"]
    ports:
      - "8085:8081"
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1g
      - SPARK_WORKER_CORES=2

# ─────────────────────────────────────────────────────────────────────────────
# PRODUCERS — Collecte automatique des articles (PubMed + ArXiv)
# ─────────────────────────────────────────────────────────────────────────────

  pubmed-producer:
    image: python:3.11-slim
    container_name: pubmed-producer
    networks: [pipeline_net]
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./producers:/app/producers:ro
      - ./config:/app/config:ro
      - ./requirements.txt:/app/requirements.txt:ro
    working_dir: /app
    entrypoint: ["bash", "-c"]
    command: ["pip install -q kafka-python requests && python producers/pubmed_producer.py --query 'health medical recommendation system' --max 1000 --interval 2 --loop"]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: unless-stopped

  arxiv-producer:
    image: python:3.11-slim
    container_name: arxiv-producer
    networks: [pipeline_net]
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./producers:/app/producers:ro
      - ./config:/app/config:ro
      - ./requirements.txt:/app/requirements.txt:ro
    working_dir: /app
    entrypoint: ["bash", "-c"]
    command: ["pip install -q kafka-python requests && python producers/arxiv_producer.py --query 'graph neural network recommender system' --max 1000 --interval 2 --loop"]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────
# SPARK STREAMING — Kafka → HDFS (distribué sur 4 workers)
# ─────────────────────────────────────────────────────────────────────────────

  spark-kafka-hdfs:
    image: apache/spark:3.5.0
    container_name: spark-kafka-hdfs
    user: root
    networks: [pipeline_net]
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
      - spark-worker-3
      - spark-worker-4
      - kafka
      - namenode
    volumes:
      - ./consumers:/opt/spark-apps:ro
      - ./hadoop:/opt/hadoop/conf:ro
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --deploy-mode
      - client
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.hadoop:hadoop-client:3.2.1
      - --conf
      - spark.jars.ivy=/tmp/.ivy2
      - --conf
      - spark.hadoop.fs.defaultFS=hdfs://namenode:9000
      - --conf
      - spark.sql.shuffle.partitions=4
      - --conf
      - spark.executor.instances=4
      - --conf
      - spark.executor.cores=1
      - --conf
      - spark.executor.memory=512m
      - /opt/spark-apps/spark_kafka_to_hdfs.py
    environment:
      - SPARK_NO_DAEMONIZE=true
      - HADOOP_CONF_DIR=/opt/hadoop/conf

# ─────────────────────────────────────────────────────────────────────────────
# ELK STACK
# ─────────────────────────────────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    networks: [pipeline_net]
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    networks: [pipeline_net]
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "5044:5044"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    networks: [pipeline_net]
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Filebeat — collecte les logs de tous les containers Docker ───────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: filebeat
    networks: [pipeline_net]
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: filebeat -e --strict.perms=false -E http.enabled=true
    environment:
      - ELASTICSEARCH_HOST=elasticsearch:9200

  # ── Metricbeat — collecte les métriques système + Docker ────────────────────
  metricbeat:
    image: docker.elastic.co/beats/metricbeat:8.11.0
    container_name: metricbeat
    networks: [pipeline_net]
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./metricbeat/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: metricbeat -e --strict.perms=false -E http.enabled=true
    environment:
      - ELASTICSEARCH_HOST=elasticsearch:9200
