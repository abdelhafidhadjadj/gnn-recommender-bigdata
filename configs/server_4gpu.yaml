data:
  data_dir: data/raw
  max_users: 50000
  max_reviews: 80000

graph:
  use_sbert_item_init: true
  num_neighbors: [20, 10]

model:
  emb_dim: 128
  dropout: 0.1
  gat_heads: 4
  n_layers: 2
  use_residual: true

train:
  num_epochs: 200
  lr: 0.005
  min_epochs: 80
  patience: 20
  eval_every: 10
  warmup_epochs: 10

eval:
  k_list: [5, 10, 20]
  max_eval_users: 1000

checkpoint:
  dir: checkpoints/sage
  keep_last_n: 5

model_type: sage
seed: 42
graph_mode: auto
