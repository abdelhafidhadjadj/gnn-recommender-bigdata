data:
  data_dir: data/raw
  business_file: yelp_academic_dataset_business_healthandmedical.csv
  user_file: yelp_academic_dataset_user_healthandmedical.csv
  review_file: yelp_academic_dataset_review_healthandmedical.csv
  max_users: 50000
  max_reviews: 80000
  val_size: 0.15
  test_size: 0.15
  rating_thresh: 1
  relevance_thresh: 4.0

graph:
  use_sbert_item_init: true
  use_item_item_edges: false
  sbert_model: all-mpnet-base-v2
  sbert_batch_size: 256
  num_neighbors: [15, 10]

model:
  emb_dim: 64
  dropout: 0.1
  gat_heads: 4
  n_layers: 1
  use_residual: true

train:
  num_epochs: 200
  lr: 0.005
  gat_lr: 0.001
  optimizer: adam
  reg_lambda: 1.0e-5
  use_scheduler: true
  warmup_epochs: 10
  min_epochs: 80
  patience: 15
  eval_every: 10
  use_all_pairs: true

eval:
  k_list: [5, 10, 20]
  max_eval_users: 500
  relevance_thresh: 4.0
  use_global_precision: true
  use_k_filter: true

checkpoint:
  dir: checkpoints
  keep_last_n: 3
  save_every_n_epochs: 20

incremental:
  finetune_epochs: 20
  finetune_lr_scale: 0.1
  warmup_epochs: 2
  replay_ratio: 0.3
  replay_capacity: 10000
  new_data_only: false

model_type: sage
seed: 42
graph_mode: auto
