data:
  data_dir: data/medium

graph:
  use_sbert_item_init: false   # LightGCN uses collaborative signal only

model:
  emb_dim: 64
  dropout: 0.0
  n_layers: 2       # LightGCN benefits from 2-3 layers
  use_residual: false

train:
  num_epochs: 100
  lr: 0.005
  reg_lambda: 1.0e-4
  min_epochs: 40
  patience: 15
  eval_every: 10

checkpoint:
  dir: checkpoints/lightgcn

model_type: lightgcn
seed: 42
