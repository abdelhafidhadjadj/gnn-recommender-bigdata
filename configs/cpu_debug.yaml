data:
  data_dir: data/test
  max_users: 1000
  max_reviews: 5000

graph:
  use_sbert_item_init: false   # too slow for debug

model:
  emb_dim: 16
  dropout: 0.0
  n_layers: 1

train:
  num_epochs: 3
  min_epochs: 0
  patience: 1
  eval_every: 1
  warmup_epochs: 0
  use_scheduler: false

eval:
  k_list: [5, 10]
  max_eval_users: 100

checkpoint:
  dir: checkpoints/debug
  keep_last_n: 1
  save_every_n_epochs: 1

model_type: sage
seed: 42
