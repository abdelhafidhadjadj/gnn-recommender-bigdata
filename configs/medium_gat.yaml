data:
  data_dir: data/medium

model:
  emb_dim: 64
  dropout: 0.1
  gat_heads: 4
  n_layers: 1
  use_residual: true

train:
  num_epochs: 100
  lr: 0.001        # lower LR for GAT stability
  gat_lr: 0.001
  min_epochs: 40
  patience: 15
  eval_every: 10
  reg_lambda: 1.0e-5

checkpoint:
  dir: checkpoints/gat

model_type: gat
seed: 42
